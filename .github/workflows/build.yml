name: Build XRTL Terminal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Cache electron-builder
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ELECTRON_BUILDER_CACHE }}
          ~/.npm/_npx/*/node_modules
        key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-builder-

    - name: Install npm dependencies
      run: npm install
      env:
        ELECTRON_MIRROR: ${{ env.ELECTRON_MIRROR }}
        ELECTRON_BUILDER_BINARIES_MIRROR: ${{ env.ELECTRON_BUILDER_BINARIES_MIRROR }}

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Verify public files are copied to build directory
      run: |
        Write-Host "=== Checking build/renderer directory structure ==="
        Get-ChildItem -Path build/renderer -Recurse -Name | Select-Object -First 30
        Write-Host "`n=== Checking build/renderer/dynamic_pages ==="
        Get-ChildItem -Path build/renderer/dynamic_pages -Name -ErrorAction SilentlyContinue
        Write-Host "`n=== Checking build/renderer/builtin_pictures ==="
        Get-ChildItem -Path build/renderer/builtin_pictures -Name -ErrorAction SilentlyContinue | Select-Object -First 10

    - name: Package for Windows (portable exe)
      run: npm run dist -- --windows portable
      env:
        ELECTRON_BUILDER_BINARIES_MIRROR: ${{ env.ELECTRON_BUILDER_BINARIES_MIRROR }}

    - name: Package for Windows (installer)
      run: npm run dist -- --windows nsis
      env:
        ELECTRON_BUILDER_BINARIES_MIRROR: ${{ env.ELECTRON_BUILDER_BINARIES_MIRROR }}

    - name: List dist directory
      run: dir dist\*.exe /b
      shell: cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xrtl-desktop-wallpaper-builds
        path: |
          dist/*.exe
          dist/*.zip
          dist/*.nsis-installer.exe
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: xrtl-desktop-wallpaper-builds
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.exe
          dist/*.zip
          dist/*.nsis-installer.exe
        generate_release_notes: true
