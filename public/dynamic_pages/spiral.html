<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺旋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        let time = 0;
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            for (let spiral = 0; spiral < 3; spiral++) {
                ctx.beginPath();
                for (let i = 0; i < 500; i++) {
                    const t = i * 0.02 + time * 0.001 + spiral * Math.PI * 2 / 3;
                    const r = i * 0.8;
                    const x = centerX + Math.cos(t) * r;
                    const y = centerY + Math.sin(t) * r;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                const hue = 200 + spiral * 60;
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            
            time++;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
