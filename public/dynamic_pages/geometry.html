<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Shape {
            constructor() {
                this.type = Math.floor(Math.random() * 3);
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 30 + Math.random() * 80;
                this.hue = Math.random() * 360;
                this.rotation = 0;
                this.speed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                this.rotation += this.speed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.fillStyle = `hsla(${this.hue}, 80%, 50%, 0.3)`;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, 0.8)`;
                ctx.lineWidth = 2;
                
                if (this.type === 0) {
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI * 2) / 6;
                        const px = Math.cos(angle) * this.size;
                        const py = Math.sin(angle) * this.size;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                } else if (this.type === 1) {
                    ctx.beginPath();
                    ctx.rect(-this.size / 2, -this.size / 2, this.size, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                }
                
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }
        
        const shapes = [];
        for (let i = 0; i < 15; i++) shapes.push(new Shape());
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            shapes.forEach(s => { s.update(); s.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
