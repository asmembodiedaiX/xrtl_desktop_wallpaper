<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脉冲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class PulseRing {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 200 + Math.random() * 200;
                this.speed = 1 + Math.random() * 2;
                this.hue = Math.random() * 360;
            }
            
            update() {
                this.radius += this.speed;
            }
            
            draw() {
                const alpha = 1 - this.radius / this.maxRadius;
                if (alpha <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            isDone() {
                return this.radius >= this.maxRadius;
            }
        }
        
        const rings = [];
        
        function createRing() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            rings.push(new PulseRing(x, y));
        }
        
        setInterval(createRing, 800);
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            rings.forEach((ring, i) => {
                ring.update();
                ring.draw();
                if (ring.isDone()) rings.splice(i, 1);
            });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
