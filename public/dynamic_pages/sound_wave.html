<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声波</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        let time = 0;
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerY = canvas.height / 2;
            const bars = 100;
            const barWidth = canvas.width / bars;
            
            for (let i = 0; i < bars; i++) {
                const x = i * barWidth;
                const height = Math.sin(time + i * 0.2) * 100 +
                    Math.sin(time * 2 + i * 0.3) * 50 +
                    Math.sin(time * 0.5 + i * 0.1) * 30;
                const hue = 180 + i * 2 + Math.sin(time) * 30;
                
                const gradient = ctx.createLinearGradient(x, centerY - height, x, centerY + height);
                gradient.addColorStop(0, `hsla(${hue}, 80%, 70%, 0.8)`);
                gradient.addColorStop(1, `hsla(${hue}, 80%, 40%, 0.3)`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, centerY - height, barWidth - 2, height * 2);
            }
            
            time += 0.05;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
