<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光波动</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        let time = 0;
        
        function animate() {
            time += 0.01;
            
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let layer = 0; layer < 5; layer++) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                
                for (let x = 0; x <= canvas.width; x++) {
                    const y = canvas.height * (0.3 + layer * 0.1) +
                        Math.sin(x * 0.005 + time + layer * 0.5) * 50 +
                        Math.sin(x * 0.003 + time * 0.7 + layer) * 30;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                
                const hue = 160 + layer * 20 + Math.sin(time * 0.5) * 20;
                ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${0.1 + layer * 0.05})`;
                ctx.fill();
            }
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
