<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气泡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: linear-gradient(to bottom, #0c3483 0%, #1a5276 50%, #1e6f5c 100%); height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Bubble {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = 10 + Math.random() * 40;
                this.speed = 0.5 + (50 - this.size) * 0.03;
                this.wobble = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.y -= this.speed;
                this.wobble += 0.02;
                this.x += Math.sin(this.wobble) * 0.3;
                
                if (this.y < -this.size) this.reset();
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x - this.size * 0.3, this.y - this.size * 0.3, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(200, 230, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(100, 180, 255, 0.1)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        const bubbles = [];
        for (let i = 0; i < 30; i++) bubbles.push(new Bubble());
        
        function animate() {
            ctx.fillStyle = 'rgba(12, 52, 131, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            bubbles.forEach(b => { b.update(); b.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
