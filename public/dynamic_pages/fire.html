<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a0a00; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Flame {
            constructor(x) {
                this.x = x;
                this.y = canvas.height;
                this.particles = [];
            }
            
            emit() {
                const particle = {
                    x: this.x + (Math.random() - 0.5) * 40,
                    y: canvas.height - 20,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -2 - Math.random() * 4,
                    life: 1,
                    size: 5 + Math.random() * 15,
                    hue: 0 + Math.random() * 30
                };
                this.particles.push(particle);
            }
            
            update() {
                this.particles.forEach((p, i) => {
                    p.x += p.vx + (Math.random() - 0.5) * 0.5;
                    p.y += p.vy;
                    p.vy -= 0.05;
                    p.life -= 0.008;
                    
                    if (p.life <= 0) this.particles.splice(i, 1);
                });
            }
            
            draw() {
                this.particles.forEach(p => {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    const alpha = p.life;
                    gradient.addColorStop(0, `hsla(${p.hue + 60}, 100%, 70%, ${alpha})`);
                    gradient.addColorStop(0.5, `hsla(${p.hue + 30}, 100%, 50%, ${alpha * 0.8})`);
                    gradient.addColorStop(1, `hsla(${p.hue}, 100%, 30%, 0)`);
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                });
            }
        }
        
        const flames = [
            new Flame(canvas.width * 0.3),
            new Flame(canvas.width * 0.5),
            new Flame(canvas.width * 0.7)
        ];
        
        let frame = 0;
        
        function animate() {
            ctx.fillStyle = 'rgba(26, 10, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (frame % 2 === 0) {
                flames.forEach(f => f.emit());
            }
            
            flames.forEach(f => {
                f.update();
                f.draw();
            });
            
            frame++;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
