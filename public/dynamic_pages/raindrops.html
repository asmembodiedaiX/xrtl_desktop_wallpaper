<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨滴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%); height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.length = 10 + Math.random() * 20;
                this.speed = 5 + Math.random() * 5;
                this.thickness = 1 + Math.random() * 2;
            }
            
            update() {
                this.y += this.speed;
                
                if (this.y > canvas.height + this.length) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.strokeStyle = `rgba(150, 200, 255, ${0.3 + Math.random() * 0.4})`;
                ctx.lineWidth = this.thickness;
                ctx.stroke();
            }
        }
        
        const raindrops = [];
        for (let i = 0; i < 100; i++) raindrops.push(new Raindrop());
        
        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            raindrops.forEach(r => { r.update(); r.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
