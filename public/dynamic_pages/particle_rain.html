<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子雨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10 - Math.random() * 100;
                this.speed = 2 + Math.random() * 5;
                this.size = 2 + Math.random() * 4;
                this.hue = 180 + Math.random() * 120;
                this.opacity = 0.5 + Math.random() * 0.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
            }
            
            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
                
                if (this.y > canvas.height + 10) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${this.opacity})`;
                ctx.fill();
            }
        }
        
        // === 鼠标交互 — 从 window.__mx / __my 读取（主进程 executeJavaScript 注入） ===
        // 也兼容标准 mousemove 事件
        let mouseX = -1000, mouseY = -1000;
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        const particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push(new Particle());
        }

        function animate() {
            // 每帧从全局变量读取最新鼠标坐标
            if (typeof window.__mx === 'number') mouseX = window.__mx;
            if (typeof window.__my === 'number') mouseY = window.__my;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                // 粒子向鼠标位置偏移
                const dx = mouseX - particle.x;
                const dy = mouseY - particle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300 && dist > 1) {
                    const force = (300 - dist) / 300 * 0.5;
                    particle.x += (dx / dist) * force;
                    particle.y += (dy / dist) * force * 0.3;
                }
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
