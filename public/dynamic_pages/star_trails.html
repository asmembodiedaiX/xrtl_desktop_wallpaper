<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星轨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class StarTrail {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 50 + Math.random() * Math.min(canvas.width, canvas.height) * 0.3;
                this.speed = 0.0001 + Math.random() * 0.0003;
                this.length = Math.random() * 100 + 50;
                this.hue = Math.random() * 360;
                this.trail = [];
            }
            
            update() {
                this.angle += this.speed;
                const x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.radius;
                
                this.trail.push({ x, y });
                if (this.trail.length > this.length) {
                    this.trail.shift();
                }
            }
            
            draw() {
                if (this.trail.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                
                for (let i = 1; i < this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                
                const alpha = 1 - this.trail.length / this.length;
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${0.5 + alpha * 0.5})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                const last = this.trail[this.trail.length - 1];
                ctx.beginPath();
                ctx.arc(last.x, last.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
            }
        }
        
        const trails = [];
        for (let i = 0; i < 50; i++) trails.push(new StarTrail());
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            trails.forEach(t => { t.update(); t.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
