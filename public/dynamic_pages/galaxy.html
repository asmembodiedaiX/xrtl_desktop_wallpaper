<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星系</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.brightness = 0.3 + Math.random() * 0.7;
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
            }
            
            draw() {
                const alpha = this.brightness * (0.5 + Math.sin(this.twinklePhase) * 0.5);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        class Planet {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = 100 + Math.random() * 200;
                this.speed = 0.001 + Math.random() * 0.003;
                this.size = 5 + Math.random() * 15;
                this.hue = Math.random() * 360;
            }
            
            update() {
                this.angle += this.speed;
            }
            
            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.distance;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.distance;
                
                const glow = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                glow.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 0.8)`);
                glow.addColorStop(0.5, `hsla(${this.hue}, 80%, 40%, 0.3)`);
                glow.addColorStop(1, `hsla(${this.hue}, 80%, 30%, 0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 70%, 50%)`;
                ctx.fill();
            }
        }
        
        const stars = [];
        for (let i = 0; i < 300; i++) {
            stars.push(new Star());
        }
        
        const planets = [];
        for (let i = 0; i < 5; i++) {
            planets.push(new Planet());
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 鼠标位置影响星系核心位置
            const mx = window.__mx || canvas.width / 2;
            const my = window.__my || canvas.height / 2;
            const centerX = canvas.width / 2 + (mx - canvas.width / 2) * 0.3;
            const centerY = canvas.height / 2 + (my - canvas.height / 2) * 0.3;

            stars.forEach(star => {
                const dx = star.x - mx;
                const dy = star.y - my;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && dist > 1) {
                    star.x += (dx / dist) * 0.3;
                    star.y += (dy / dist) * 0.3;
                }
                star.update();
                star.draw();
            });

            const coreGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            coreGlow.addColorStop(0, 'rgba(255, 255, 200, 1)');
            coreGlow.addColorStop(0.3, 'rgba(255, 200, 100, 0.5)');
            coreGlow.addColorStop(1, 'rgba(100, 50, 0, 0)');
            ctx.fillStyle = coreGlow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fill();

            planets.forEach(planet => {
                planet.update();
                planet.draw();
            });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
