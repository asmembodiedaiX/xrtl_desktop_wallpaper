<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日出</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        let time = 0;
        const cycleDuration = 3000;
        
        function animate() {
            time = (Date.now() % cycleDuration) / cycleDuration;
            
            const sunY = canvas.height * (0.8 - time * 0.6);
            const skyHue = 180 + time * 60;
            const skySaturation = 30 + time * 40;
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, `hsl(${skyHue}, ${skySaturation}%, 40%)`);
            gradient.addColorStop(0.5, `hsl(${skyHue + 20}, ${skySaturation + 10}%, 60%)`);
            gradient.addColorStop(1, `hsl(45, 60%, 70%)`);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const sunGlow = ctx.createRadialGradient(
                canvas.width / 2, sunY, 0,
                canvas.width / 2, sunY, canvas.width * 0.5
            );
            sunGlow.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
            sunGlow.addColorStop(0.3, 'rgba(255, 200, 100, 0.4)');
            sunGlow.addColorStop(1, 'rgba(255, 150, 50, 0)');
            ctx.fillStyle = sunGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(canvas.width / 2, sunY, 40, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(canvas.width / 2, sunY, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            
            ctx.fillStyle = '#2d5a3d';
            ctx.fillRect(0, canvas.height * 0.85, canvas.width, canvas.height * 0.15);
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
