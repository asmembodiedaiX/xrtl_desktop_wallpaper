<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Aurora {
            constructor() {
                this.y = canvas.height * (0.2 + Math.random() * 0.4);
                this.baseWidth = canvas.width * (0.5 + Math.random() * 0.5);
                this.hue = 120 + Math.random() * 60;
                this.speed = 0.002 + Math.random() * 0.003;
                this.phase = Math.random() * Math.PI * 2;
                this.offset = Math.random() * canvas.width;
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                
                for (let x = 0; x <= canvas.width; x++) {
                    const wave1 = Math.sin((x + this.offset) * 0.005 + this.phase) * 50;
                    const wave2 = Math.sin((x - this.offset) * 0.003 + this.phase * 1.3) * 30;
                    const wave3 = Math.sin(x * 0.008 + this.phase * 0.7) * 20;
                    const y = this.y + wave1 + wave2 + wave3;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, this.y - 100, 0, this.y + 100);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, 0)`);
                gradient.addColorStop(0.3, `hsla(${this.hue}, 70%, 50%, 0.5)`);
                gradient.addColorStop(0.7, `hsla(${this.hue + 20}, 80%, 40%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 70%, 30%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            update() {
                this.phase += this.speed;
            }
        }
        
        const auroras = [];
        for (let i = 0; i < 4; i++) auroras.push(new Aurora());
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            auroras.forEach(a => { a.update(); a.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body
