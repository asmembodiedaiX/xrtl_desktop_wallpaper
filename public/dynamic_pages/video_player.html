<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
</style>
</head>
<body><video id="v" autoplay loop muted playsinline></video><canvas id="c"></canvas>
<script>
(function(){
var c=document.getElementById('c'),ctx=c.getContext('2d'),W,H;
var mx=-200,my=-200,px=-200,py=-200,md=false;
var clicks=[],trails=[],specials=[];
var effect={click:'ripple',trail:'particles',special:null};

function rs(){W=c.width=innerWidth;H=c.height=innerHeight}rs();addEventListener('resize',rs);

// ====== 特效系统 ======
var CFG={
  ripple:{maxR:140,speed:4,color:'rgba(255,255,255,X)',thick:2},
  stars:{count:15,speed:3,size:8,color:'#FFD700'},
  hearts:{count:10,speed:2,size:12,color:'#FF69B4'},
  confetti:{count:20,speed:4,size:6,color:'random'},
  sakura:{count:12,speed:1.5,size:10,color:'#FFB7C5'},
  snowflake:{count:18,speed:1,size:8,color:'#E0FFFF'},
  firework:{count:30,speed:6,size:4,color:'random'},
};

function spawnClickEffect(x,y,type){
  var cfg=CFG[type]||CFG.ripple;
  if(type==='ripple'){clicks.push({x,y,r:0,maxR:cfg.maxR,o:1});return}
  var n=cfg.count||15;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=(1+Math.random())*cfg.speed;
    clicks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.015+Math.random()*0.03,
      size:(2+Math.random()*cfg.size),color:cfg.color,hue:Math.random()*360});
  }
}

function spawnTrailParticle(x,y,type){
  var hue=Date.now()/10%360;
  switch(type){
    case'rainbow':hue=(x/W*360+y/H*360)%360;break;
    case'glow':hue=200+Math.random()*40;break;
    case'ink':hue=0;break;
    case'neon':hue=300+Math.random()*60;break;
    case'petal':hue=340+Math.random()*20;break;
  }
  trails.push({x,y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1,
    decay:0.015+Math.random()*0.04,size:type==='ink'?3+Math.random()*6:2+Math.random()*4,hue:hue});
}

// ====== 场景特效 ======
function updateSpecials(){
  var s=effect.special;
  if(!s)return;
  if(s==='snow'&&Math.random()<0.3)specials.push({x:Math.random()*W,y:-10,vx:(Math.random()-0.5)*2,vy:1+Math.random()*3,size:2+Math.random()*6,life:1,decay:0,isSnow:true});
  if(s==='rain'&&Math.random()<0.5)specials.push({x:Math.random()*W,y:-10,vx:-2,vy:10+Math.random()*8,size:1,life:1,decay:0,isRain:true});
  if(s==='bubbles'&&Math.random()<0.15)specials.push({x:mx+(Math.random()-0.5)*100,y:my+50,vx:(Math.random()-0.5)*2,vy:-2-Math.random()*3,size:5+Math.random()*20,life:1,decay:0.003,isBubble:true});
  if(s==='fire'&&Math.random()<0.4)specials.push({x:mx+(Math.random()-0.5)*60,y:my+20,vx:(Math.random()-0.5)*1.5,vy:-3-Math.random()*5,size:3+Math.random()*8,life:1,decay:0.02,isFire:true,hue:15+Math.random()*30});
  if(s==='halo'&&specials.length<1)specials.push({x:mx,y:my,life:1,decay:0,isHalo:true});
}

// ====== 每帧渲染 ======
function draw(){
  ctx.clearRect(0,0,W,H);

  // 读取全局配置
  if(typeof window.__effect==='object'&&window.__effect){
    var e=window.__effect;
    if(e.click!==undefined)effect.click=e.click;
    if(e.trail!==undefined)effect.trail=e.trail;
    if(e.special!==undefined)effect.special=e.special;
  }

  // 鼠标拖尾
  if(effect.trail&&mx>0&&my>0){
    var dx=mx-px,dy=my-py,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>0.5){var steps=Math.ceil(dist/6);for(var i=0;i<steps;i++)spawnTrailParticle(px+dx*i/steps,py+dy*i/steps,effect.trail)}
  }

  // 更新+绘制拖尾粒子
  for(var i=trails.length-1;i>=0;i--){
    var t=trails[i];t.x+=t.vx;t.y+=t.vy;t.life-=t.decay;
    if(t.life<=0){trails.splice(i,1);continue}
    var col=effect.trail==='rainbow'?'hsla('+t.hue+',90%,65%,'+t.life*0.7+')':
            effect.trail==='glow'?'hsla('+t.hue+',100%,70%,'+t.life*0.5+')':
            effect.trail==='ink'?'rgba(47,79,79,'+t.life*0.6+')':
            effect.trail==='neon'?'hsla(300,100%,60%,'+t.life*0.8+')':
            effect.trail==='petal'?'hsla(350,80%,70%,'+t.life*0.6+')':
            'hsla('+t.hue+',80%,70%,'+t.life*0.6+')';
    ctx.beginPath();ctx.arc(t.x,t.y,t.size*t.life,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  }

  // 更新+绘制点击特效
  for(var i=clicks.length-1;i>=0;i--){
    var cl=clicks[i];
    if(!cl.vx){// ripple
      cl.r+=CFG.ripple.speed;cl.o-=0.02;
      if(cl.o<=0){clicks.splice(i,1);continue}
      ctx.beginPath();ctx.arc(cl.x,cl.y,cl.r,0,Math.PI*2);
      ctx.strokeStyle=CFG.ripple.color.replace('X',cl.o);ctx.lineWidth=CFG.ripple.thick*cl.o;ctx.stroke();
    }else{
      cl.x+=cl.vx;cl.y+=cl.vy;cl.life-=cl.decay;cl.vy+=0.1;
      if(cl.life<=0){clicks.splice(i,1);continue}
      var cc=cl.color==='random'?'hsl('+cl.hue+',80%,60%)':cl.color;
      ctx.globalAlpha=cl.life;ctx.fillStyle=cc;
      if(effect.click==='hearts'){
        ctx.beginPath();var hx=cl.x,hy=cl.y,sz=cl.size*cl.life;
        ctx.moveTo(hx,hy+sz*0.3);ctx.bezierCurveTo(hx-sz,hy-sz*0.5,hx-sz,hy+sz*0.3,hx,hy+sz);
        ctx.bezierCurveTo(hx+sz,hy+sz*0.3,hx+sz,hy-sz*0.5,hx,hy+sz*0.3);ctx.fill();
      }else if(effect.click==='sakura'||effect.click==='snowflake'){
        ctx.arc(cl.x,cl.y,cl.size*cl.life,0,Math.PI*2);ctx.fill();
        for(var j=0;j<5;j++){var a2=j/5*Math.PI*2;ctx.beginPath();ctx.arc(cl.x+Math.cos(a2)*cl.size*cl.life*0.8,cl.y+Math.sin(a2)*cl.size*cl.life*0.8,cl.size*cl.life*0.3,0,Math.PI*2);ctx.fill()}
      }else{
        ctx.beginPath();ctx.arc(cl.x,cl.y,cl.size*cl.life,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }

  // 场景特效
  updateSpecials();
  for(var i=specials.length-1;i>=0;i--){
    var sp=specials[i];
    sp.x+=sp.vx;sp.y+=sp.vy;sp.life-=sp.decay;
    if(sp.life<=0||sp.y>H+50||sp.x<-50||sp.x>W+50){specials.splice(i,1);continue}

    if(sp.isSnow||sp.isRain){
      ctx.beginPath();ctx.arc(sp.x,sp.y,sp.size,0,Math.PI*2);
      ctx.fillStyle=sp.isSnow?'rgba(255,255,255,0.8)':'rgba(135,206,235,0.5)';ctx.fill();
    }else if(sp.isBubble){
      ctx.beginPath();ctx.arc(sp.x,sp.y,sp.size,0,Math.PI*2);
      ctx.strokeStyle='rgba(173,216,230,0.4)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(sp.x-sp.size*0.3,sp.y-sp.size*0.3,sp.size*0.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
    }else if(sp.isFire){
      ctx.beginPath();ctx.arc(sp.x,sp.y,sp.size*sp.life,0,Math.PI*2);
      ctx.fillStyle='hsla('+sp.hue+',100%,60%,'+sp.life+')';ctx.fill();
      ctx.beginPath();ctx.arc(sp.x,sp.y-sp.size*0.3,sp.size*sp.life*0.6,0,Math.PI*2);
      ctx.fillStyle='hsla(40,100%,80%,'+sp.life+')';ctx.fill();
    }else if(sp.isHalo){
      var g=ctx.createRadialGradient(sp.x,sp.y,20,sp.x,sp.y,80);
      g.addColorStop(0,'rgba(255,215,0,0.15)');g.addColorStop(0.5,'rgba(255,215,0,0.05)');g.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sp.x,sp.y,80,0,Math.PI*2);ctx.fill();
    }
  }

  px=mx;py=my;requestAnimationFrame(draw);
}

// ====== 主进程注入 ======
Object.defineProperty(window,'__mx',{set:function(v){mx=v},get:function(){return mx}});
Object.defineProperty(window,'__my',{set:function(v){my=v},get:function(){return my}});
Object.defineProperty(window,'__mousedown',{set:function(v){
  if(v&&!md&&effect.click){spawnClickEffect(mx,my,effect.click)}
  md=v;
},get:function(){return md}});

draw();
})();
</script>
</body>
</html>
