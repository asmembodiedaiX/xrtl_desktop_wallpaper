<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旋转星系</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        class Star {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * Math.min(canvas.width, canvas.height) * 0.4;
                this.speed = 0.0001 + (1 - this.distance / (Math.min(canvas.width, canvas.height) * 0.4)) * 0.002;
                this.size = Math.random() * 2 + 0.5;
                this.hue = 200 + Math.random() * 60;
            }
            
            update() {
                this.angle += this.speed;
            }
            
            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.distance;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.distance;
                
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${0.5 + Math.random() * 0.5})`;
                ctx.fill();
            }
        }
        
        const stars = [];
        for (let i = 0; i < 500; i++) stars.push(new Star());
        
        let time = 0;
        
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const coreGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            coreGlow.addColorStop(0, 'rgba(255, 200, 150, 0.8)');
            coreGlow.addColorStop(0.5, 'rgba(200, 100, 150, 0.3)');
            coreGlow.addColorStop(1, 'rgba(100, 50, 100, 0)');
            ctx.fillStyle = coreGlow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
            ctx.fill();
            
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            time++;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
